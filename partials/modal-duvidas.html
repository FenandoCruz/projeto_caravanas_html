<!-- Modal: sobre o que a pessoa tem dúvidas -->
<div id="modalDuvidas" class="modal-overlay" hidden>
	<div class="modal">
		<button id="btnFecharModalDuvidasX" class="modal-fechar" aria-label="Fechar">&times;</button>

		<div id="etapaAssunto">
			<h3>Sobre o que você tem dúvidas?</h3>
			<div class="lista-assuntos">
				<button type="button" class="assunto-btn" data-assunto="Requisitos para participar">Requisitos para participar</button>
				<button type="button" class="assunto-btn" data-assunto="Custos e pagamento">Custos e pagamento</button>
				<button type="button" class="assunto-btn" data-assunto="Reservas de Ordenanças">Reservas de Ordenanças</button>
				<button type="button" class="assunto-btn" data-assunto="Horários e embarque">Horários e embarque</button>
				<button type="button" class="assunto-btn" data-assunto="Inscrição na caravana">Inscrição na caravana</button>
				<button type="button" class="assunto-btn" data-assunto="Outro assunto">Outro assunto</button>
			</div>
		</div>

		<div id="etapaConfirmarDuvida" hidden>
			<h3>Confirmar mensagem</h3>
			<p id="previewMensagemDuvida" class="modal-nome"></p>
			<div class="modal-botoes">
				<button id="btnEnviarDuvidaWhatsapp">Enviar no WhatsApp</button>
				<button id="btnVoltarAssunto" class="btn-secundario">Voltar</button>
			</div>
		</div>
	</div>
</div>
