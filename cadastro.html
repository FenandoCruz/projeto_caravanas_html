<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Caravanas SUD</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <nav class="top-nav" aria-label="Menu principal">
            <a href="index.html">Início</a>
            <a href="cadastro.html" class="active">Cadastro</a>
            <a href="login.html">Login</a>
            <a href="minha_caravana.html">Minha caravana</a>
        </nav>
        <div class="page-hero">
            <h1>Cadastro</h1>
            <p>Crie sua conta para reservar sua vaga na caravana.</p>
        </div>
    </header>
    <main class="form-page">
        <section class="form-card">
            <h2>Preencha seus dados</h2>
            <form>
                <label>Nome completo
                    <input type="text" placeholder="Seu nome completo" />
                </label>
                <label>E-mail
                    <input type="email" placeholder="seu@email.com" />
                </label>
                <label>Senha
                    <input type="password" placeholder="Crie uma senha" />
                </label>
                <label>Confirmar senha
                    <input type="password" placeholder="Digite a mesma senha" />
                </label>
                <button type="submit">Cadastrar</button>
            </form>
            <p class="small-text">Já tem conta? <a href="login.html">faça login aqui</a>.</p>
        </section>
    </main>
</body>
</html>
