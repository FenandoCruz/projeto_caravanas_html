<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Caravanas SUD</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/nav.css" />
</head>
<body>
    <header>
        <nav class="top-nav" aria-label="Menu principal">
            <a href="index.html">Início</a>
            <a href="login.html" class="active">Login</a>
            <a href="minha_caravana.html">Minha caravana</a>
        </nav>
        <div class="page-hero">
            <h1>Login</h1>
            <p>Faça login para continuar com a reserva ou ver sua caravana.</p>
        </div>
    </header>
    <main class="form-page">
        <section class="form-card">
            <h2>Entrar na sua conta</h2>
            <form id="formLogin">
                <label>E-mail
                    <input type="email" id="inputLoginEmail" placeholder="seu@email.com" required />
                </label>
                <label>Senha
                    <input type="password" id="inputLoginSenha" placeholder="Sua senha" required />
                </label>
                <button type="submit">Entrar</button>
            </form>
            <p class="small-text">Ainda não tem cadastro? <a href="cadastro.html">cadastre-se aqui</a>.</p>
        </section>
    </main>
    <footer class="site-footer">
        <p>© 2026 Caravanas SUD — Todos os direitos reservados</p>
    </footer>
    <script src="js/auth.js" defer></script>
    <script src="js/login.js" defer></script>
</body>
</html>
